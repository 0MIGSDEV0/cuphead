<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cuphead Boss Battle – HTML/CSS/JS</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(to bottom, #0d001a 0%, #1a0033 40%, #330066 100%);
      font-family: Arial, sans-serif;
      overflow: hidden;
      image-rendering: pixelated;
      touch-action: none;
    }

    .game-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .sky {
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 30%, #ff00aa22 0%, transparent 40%),
        radial-gradient(circle at 80% 60%, #00ffff22 0%, transparent 50%);
      pointer-events: none;
    }

    .ground {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 18vh;
      background: linear-gradient(#8b2e8b, #4a1a4a);
      border-top: 12px solid #ff00ff;
      box-shadow: 0 -8px 0 #aa00aa;
    }

    .boss {
      position: absolute;
      width: 220px;
      height: 220px;
      left: 50%;
      top: 15%;
      transform: translateX(-50%);
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translate(-50%, 0) rotate(3deg); }
      50%     { transform: translate(-50%, -30px) rotate(-3deg); }
    }

    .head {
      width: 100%;
      height: 100%;
      background: #ff3366;
      border-radius: 50% 50% 40% 40%;
      border: 14px solid #000;
      box-shadow: 
        inset 0 30px 0 #ff6699,
        inset -40px -30px 0 #cc0044,
        0 0 0 18px #880033;
      position: relative;
      overflow: hidden;
    }

    .eye-left, .eye-right {
      position: absolute;
      width: 60px;
      height: 70px;
      background: white;
      border-radius: 50%;
      top: 45px;
      border: 8px solid black;
    }
    .eye-left  { left: 35px; }
    .eye-right { right: 35px; }

    .pupil {
      width: 28px;
      height: 38px;
      background: #000;
      border-radius: 50%;
      position: absolute;
      top: 14px;
      left: 16px;
      animation: look 4s infinite;
    }

    @keyframes look {
      0%, 20%, 80%, 100% { transform: translate(0,0); }
      40%  { transform: translate(12px, 4px); }
      60%  { transform: translate(-8px, -6px); }
    }

    .mouth {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 90px;
      height: 50px;
      background: #000;
      border-radius: 0 0 80px 80px;
      border-bottom: 12px solid #ff0000;
      animation: laugh 3.2s infinite;
    }

    @keyframes laugh {
      0%,100% { height: 50px; border-radius: 0 0 80px 80px; }
      50%     { height: 80px; border-radius: 0 0 120px 120px; }
    }

    .player {
      position: absolute;
      bottom: 22vh;
      left: 15%;
      width: 80px;
      height: 110px;
      background: #00aaff;
      border: 10px solid #000;
      border-radius: 30% 30% 20% 20%;
      box-shadow: inset 0 20px 0 #00ccff;
      transition: transform 0.08s;
    }

    .straw {
      position: absolute;
      top: -50px;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 70px;
      background: linear-gradient(#ffdd00, #ffaa00);
      border: 6px solid black;
      border-radius: 10px;
    }

    .bullet {
      position: absolute;
      width: 24px;
      height: 24px;
      background: #ffff00;
      border: 6px solid #ff8800;
      border-radius: 50%;
      box-shadow: 0 0 20px #ffff00;
      pointer-events: none;
      animation: shoot 1.2s linear forwards;
    }

    @keyframes shoot {
      to { transform: translateY(-140vh); }
    }

    .health-bar {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 34px;
      background: #111;
      border: 6px solid #fff;
      border-radius: 10px;
      overflow: hidden;
      z-index: 10;
    }

    .health {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #ff0044, #ff8800);
      transition: width 0.4s;
    }

    h1 {
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
      font-size: 2.8rem;
      margin: 0;
      pointer-events: none;
      z-index: 10;
    }

    .credits {
      position: absolute;
      bottom: 10px;
      right: 20px;
      color: #aaa;
      font-size: 0.9rem;
      pointer-events: none;
      z-index: 5;
    }

    .instructions, .start-screen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 20px 40px;
      border-radius: 15px;
      font-size: 1.6rem;
      text-align: center;
      z-index: 20;
      pointer-events: all;
      cursor: pointer;
      text-shadow: 2px 2px 4px black;
    }

    .start-screen {
      font-size: 2.5rem;
    }
  </style>
</head>
<body>

<div class="game-container">
  <div class="sky"></div>
  
  <h1 id="title">Beppi the Clown</h1>
  
  <div class="start-screen" id="startScreen">
    CLIQUE AQUI PARA JOGAR<br>
    <span style="font-size:1.2rem; margin-top:10px; display:block;">
      WASD ou Setas = Mover<br>
      ESPAÇO = Pular + Atirar
    </span>
  </div>

  <div class="instructions" id="instructions" style="display:none; top:80px; font-size:1.2rem; padding:10px 20px;">
    WASD / Setas = Mover<br>ESPAÇO = Pular + Atirar
  </div>

  <div class="health-bar">
    <div class="health" id="bossHP"></div>
  </div>

  <div class="boss" id="boss">
    <div class="head">
      <div class="eye-left"><div class="pupil"></div></div>
      <div class="eye-right"><div class="pupil"></div></div>
      <div class="mouth"></div>
    </div>
    <div class="straw"></div>
  </div>

  <div class="player" id="player">
    <div class="straw"></div>
  </div>

  <div class="ground"></div>

  <div class="credits">HTML + CSS + JS • Feito para GitHub</div>
</div>

<script>
  // Elementos
  const startScreen = document.getElementById("startScreen");
  const instructions = document.getElementById("instructions");
  const player = document.getElementById("player");
  const boss = document.getElementById("boss");
  const bossHP = document.getElementById("bossHP");
  const title = document.getElementById("title");

  // Variáveis do jogo
  let hp = 100;
  let playerX = 15;
  let playerY = 0;
  let isJumping = false;
  let keys = {};
  let canShoot = true;
  let gameActive = false;

  // Iniciar jogo ao clicar
  startScreen.addEventListener("click", () => {
    startScreen.remove();
    instructions.style.display = "block";
    gameActive = true;
    // player.focus(); // tenta forçar foco
  });

  // Controles
  window.addEventListener("keydown", e => {
    if (!gameActive) return;
    const key = e.key.toLowerCase();
    keys[key] = true;
    if (e.key === " ") e.preventDefault();
  });

  window.addEventListener("keyup", e => {
    const key = e.key.toLowerCase();
    keys[key] = false;
  });

  // Loop do jogo
  function gameLoop() {
    if (!gameActive) {
      requestAnimationFrame(gameLoop);
      return;
    }

    // Movimento horizontal (mais rápido)
    if (keys["a"] || keys["arrowleft"])  playerX = Math.max(5, playerX - 1.8);
    if (keys["d"] || keys["arrowright"]) playerX = Math.min(45, playerX + 1.8);

    // Pulo
    if ((keys["w"] || keys["arrowup"] || keys[" "]) && !isJumping) {
      isJumping = true;
      playerY = -90;
      setTimeout(() => playerY = -35, 220);
      setTimeout(() => { playerY = 0; isJumping = false; }, 520);
    }

    // Atualiza posição
    player.style.left = playerX + "%";
    player.style.bottom = (22 + playerY / 3) + "vh";

    // Atirar
    if (keys[" "] && canShoot) {
      shoot();
      canShoot = false;
      setTimeout(() => canShoot = true, 320);
    }

    requestAnimationFrame(gameLoop);
  }

  gameLoop();

  // Função de tiro + colisão
  function shoot() {
    const bullet = document.createElement("div");
    bullet.className = "bullet";
    bullet.style.left = (playerX + 4) + "%";
    bullet.style.bottom = (22 + playerY / 3 + 12) + "vh";
    document.body.appendChild(bullet);

    setTimeout(() => {
      if (!bullet.parentNode) return;

      const bulletRect = bullet.getBoundingClientRect();
      const bossRect = boss.getBoundingClientRect();

      if (
        bulletRect.right > bossRect.left &&
        bulletRect.left < bossRect.right &&
        bulletRect.bottom > bossRect.top &&
        bulletRect.top < bossRect.bottom
      ) {
        hp -= 10;
        if (hp < 0) hp = 0;
        bossHP.style.width = hp + "%";

        boss.style.filter = "brightness(2.8) hue-rotate(140deg)";
        setTimeout(() => boss.style.filter = "", 80);

        if (hp <= 0) {
          title.textContent = "VOCÊ VENCEU!";
          title.style.color = "#0f0";
          title.style.fontSize = "6rem";
          gameActive = false;
        }
      }

      bullet.remove();
    }, 1200);
  }
</script>

</body>
</html>
