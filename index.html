<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuphead - Jogo Simples com Boss</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #87CEEB;
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #87CEEB;
        }

        .player {
            position: absolute;
            bottom: 20px;
            left: 50%;
            width: 50px;
            height: 50px;
            background-color: red;
            border-radius: 50%;
            transform: translateX(-50%);
        }

        .enemy {
            position: absolute;
            top: 20px;
            left: 50%;
            width: 100px;
            height: 100px;
            background-color: green;
            border-radius: 50%;
            transform: translateX(-50%);
            animation: moveEnemy 5s linear infinite;
        }

        @keyframes moveEnemy {
            0% { top: 20px; left: 50%; }
            50% { top: 80%; left: 30%; }
            100% { top: 20px; left: 70%; }
        }

        .bullet {
            position: absolute;
            width: 10px;
            height: 20px;
            background-color: yellow;
            border-radius: 5px;
            transform: translateX(-50%);
            display: none;
        }

        .enemy-bullet {
            position: absolute;
            width: 10px;
            height: 20px;
            background-color: black;
            border-radius: 5px;
            display: none;
        }

        .health-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 200px;
            height: 20px;
            background-color: gray;
        }

        .health {
            height: 100%;
            background-color: red;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="player" id="player"></div>
        <div class="enemy" id="enemy"></div>
        <div class="health-bar">
            <div class="health" id="enemy-health"></div>
        </div>
    </div>

    <script>
        const player = document.getElementById("player");
        const enemy = document.getElementById("enemy");
        const enemyHealth = document.getElementById("enemy-health");
        let playerPositionX = 50; // Percentual (0% a 100%)
        let playerPositionY = 80; // Percentual (0% a 100%)
        let playerSpeed = 5;
        let isShooting = false;
        let enemyLife = 100;
        let bullets = [];

        // Controlando movimento do player
        document.addEventListener("keydown", movePlayer);
        document.addEventListener("keydown", shootBullet);

        function movePlayer(event) {
            if (event.key === "ArrowLeft" && playerPositionX > 0) {
                playerPositionX -= playerSpeed;
            } else if (event.key === "ArrowRight" && playerPositionX < 100) {
                playerPositionX += playerSpeed;
            } else if (event.key === "ArrowUp" && playerPositionY > 0) {
                playerPositionY -= playerSpeed;
            } else if (event.key === "ArrowDown" && playerPositionY < 100) {
                playerPositionY += playerSpeed;
            }

            updatePlayerPosition();
        }

        function updatePlayerPosition() {
            player.style.left = playerPositionX + "%";
            player.style.bottom = playerPositionY + "%";
        }

        // Função para atirar
        function shootBullet(event) {
            if (event.key === " ") { // Espaço para atirar
                if (!isShooting) {
                    isShooting = true;
                    const bullet = document.createElement("div");
                    bullet.classList.add("bullet");
                    bullet.style.left = playerPositionX + "%";
                    bullet.style.bottom = playerPositionY + 10 + "%";
                    document.body.appendChild(bullet);
                    bullets.push(bullet);
                    moveBullet(bullet);
                }
            }
        }

        function moveBullet(bullet) {
            let bulletInterval = setInterval(() => {
                bullet.style.bottom = parseFloat(bullet.style.bottom) + 5 + "%";
                if (parseFloat(bullet.style.bottom) > 100) {
                    clearInterval(bulletInterval);
                    bullet.remove();
                    isShooting = false;
                } else {
                    detectBulletHit(bullet);
                }
            }, 10);
        }

        // Função para detectar colisão do tiro com o chefe
        function detectBulletHit(bullet) {
            const enemyRect = enemy.getBoundingClientRect();
            const bulletRect = bullet.getBoundingClientRect();

            if (
                bulletRect.top < enemyRect.bottom &&
                bulletRect.bottom > enemyRect.top &&
                bulletRect.left < enemyRect.right &&
                bulletRect.right > enemyRect.left
            ) {
                enemyLife -= 10;
                enemyHealth.style.width = enemyLife + "%";
                bullet.remove();

                if (enemyLife <= 0) {
                    alert("Você derrotou o chefe!");
                    resetGame();
                }
            }
        }

        // Função para reiniciar o jogo
        function resetGame() {
            playerPositionX = 50;
            playerPositionY = 80;
            enemyLife = 100;
            enemyHealth.style.width = "100%";
            updatePlayerPosition();
        }

        // Movimentação do Chefe
        function moveEnemy() {
            let enemyPositionX = Math.random() * 100;
            let enemyPositionY = Math.random() * 80;
            enemy.style.left = enemyPositionX + "%";
            enemy.style.top = enemyPositionY + "%";
        }

        setInterval(moveEnemy, 3000); // O chefe se move a cada 3 segundos
    </script>
</body>
</html>
