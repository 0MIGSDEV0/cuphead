<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>The Binding of Isaac - Mini Clone (HTML/JS)</title>
<style>
    body { margin:0; overflow:hidden; background:#111; color:#fff; font-family:Arial; }
    canvas { display:block; margin:0 auto; image-rendering: pixelated; }
    #ui {
        position: absolute; top: 10px; left: 10px; z-index: 100;
        background: rgba(0,0,0,0.6); padding: 10px 15px; border-radius: 8px;
    }
    #gameOver {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        background: rgba(0,0,0,0.9); padding: 30px; border-radius: 15px; text-align: center;
        display: none; font-size: 32px;
    }
</style>
</head>
<body>

<div id="ui">
    <strong>The Binding of Isaac</strong> - Mini Clone<br>
    Vida: <span id="health">3</span> | Score: <span id="score">0</span><br>
    WASD = mover | Mouse = mirar e atirar
</div>

<canvas id="game" width="800" height="600"></canvas>

<div id="gameOver">
    <h1>GAME OVER</h1>
    <p>Score final: <span id="finalScore">0</span></p>
    <button onclick="location.reload()">Tentar novamente</button>
</div>

<script>
// ====================== CONFIGURAÇÃO ======================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;
canvas.width = W; canvas.height = H;

let player = {
    x: W/2, y: H/2,
    size: 20,
    speed: 4,
    health: 3,
    color: '#ffccaa'
};

let keys = {};
let mouse = { x: W/2, y: H/2 };
let bullets = [];
let enemies = [];
let particles = [];
let score = 0;
let gameRunning = true;

// ====================== INPUT ======================
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

canvas.addEventListener('mousedown', () => {
    if (!gameRunning) return;
    shoot();
});

function shoot() {
    const dx = mouse.x - player.x;
    const dy = mouse.y - player.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    
    bullets.push({
        x: player.x,
        y: player.y,
        vx: (dx / dist) * 10,
        vy: (dy / dist) * 10,
        size: 8,
        life: 60
    });
}

// ====================== INIMIGOS ======================
function spawnEnemy() {
    if (enemies.length > 8) return;
    
    const side = Math.floor(Math.random()*4);
    let ex, ey;
    
    if (side === 0) { ex = Math.random()*W; ey = -30; }
    else if (side === 1) { ex = W+30; ey = Math.random()*H; }
    else if (side === 2) { ex = Math.random()*W; ey = H+30; }
    else { ex = -30; ey = Math.random()*H; }
    
    enemies.push({
        x: ex, y: ey,
        size: 22,
        speed: 1.8 + Math.random()*0.8,
        health: 2,
        color: '#aa4444'
    });
}

// ====================== PARTÍCULAS (sangue/lágrimas) ======================
function createParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 4;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 25 + Math.random()*15,
            color
        });
    }
}

// ====================== LOOP PRINCIPAL ======================
let lastSpawn = 0;

function gameLoop() {
    if (!gameRunning) return;
    
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(0, 0, W, H);
    
    // Movimento do jogador
    if (keys['w'] && player.y > 30) player.y -= player.speed;
    if (keys['s'] && player.y < H-30) player.y += player.speed;
    if (keys['a'] && player.x > 30) player.x -= player.speed;
    if (keys['d'] && player.x < W-30) player.x += player.speed;
    
    // Desenhar jogador (Isaac simplificado)
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size);
    ctx.fillStyle = '#000';
    ctx.fillRect(player.x - 5, player.y - 5, 4, 4); // olho esquerdo
    ctx.fillRect(player.x + 1, player.y - 5, 4, 4); // olho direito
    
    // Balas
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx;
        b.y += b.vy;
        b.life--;
        
        ctx.fillStyle = '#aaccff';
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size/2, 0, Math.PI*2);
        ctx.fill();
        
        if (b.life <= 0 || b.x < 0 || b.x > W || b.y < 0 || b.y > H) {
            bullets.splice(i, 1);
        }
    }
    
    // Inimigos
    for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        
        // IA simples: vai na direção do jogador
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 0) {
            e.x += (dx / dist) * e.speed;
            e.y += (dy / dist) * e.speed;
        }
        
        ctx.fillStyle = e.color;
        ctx.fillRect(e.x - e.size/2, e.y - e.size/2, e.size, e.size);
        
        // Colisão com balas
        for (let j = bullets.length - 1; j >= 0; j--) {
            const b = bullets[j];
            const dx2 = b.x - e.x;
            const dy2 = b.y - e.y;
            if (dx2*dx2 + dy2*dy2 < (e.size/2 + b.size/2)**2) {
                e.health--;
                bullets.splice(j, 1);
                createParticles(b.x, b.y, '#ff6666', 8);
                
                if (e.health <= 0) {
                    createParticles(e.x, e.y, '#aa0000', 20);
                    enemies.splice(i, 1);
                    score += 10;
                    break;
                }
            }
        }
        
        // Colisão com jogador
        const pdx = player.x - e.x;
        const pdy = player.y - e.y;
        if (pdx*pdx + pdy*pdy < (player.size/2 + e.size/2)**2) {
            player.health--;
            createParticles(player.x, player.y, '#ff0000', 15);
            enemies.splice(i, 1);
            
            document.getElementById('health').textContent = player.health;
            
            if (player.health <= 0) {
                gameRunning = false;
                document.getElementById('finalScore').textContent = score;
                document.getElementById('gameOver').style.display = 'block';
            }
        }
    }
    
    // Spawn de inimigos
    if (Date.now() - lastSpawn > 1200) {
        spawnEnemy();
        lastSpawn = Date.now();
    }
    
    // Partículas
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        p.vx *= 0.95;
        p.vy *= 0.95;
        
        ctx.globalAlpha = p.life / 30;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 6, 6);
        
        if (p.life <= 0) particles.splice(i, 1);
    }
    ctx.globalAlpha = 1;
    
    // UI
    document.getElementById('score').textContent = score;
    
    requestAnimationFrame(gameLoop);
}

// Iniciar o jogo
for (let i = 0; i < 3; i++) spawnEnemy();
gameLoop();

alert("The Binding of Isaac - Mini Clone\n\nWASD = mover\nMouse = mirar e atirar\n\nSobreviva o máximo possível!");
</script>
</body>
</html>
